<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Profile Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .search-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .search-section.hide {
            display: none;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: 'Courier New', monospace;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .divider {
            text-align: center;
            color: #999;
            margin: 20px 0;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: #fadbd8;
            border-radius: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 10px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .profile-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .profile-card.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .avatar-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            overflow: hidden;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #displayName {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        #username {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 15px;
        }

        #pubkey {
            font-size: 12px;
            color: #999;
            word-break: break-all;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
        }

        #about {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }

        .back-button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #e0e0e0;
            color: #333;
        }

        .back-button:hover {
            background: #d0d0d0;
            box-shadow: none;
        }

        @media (max-width: 480px) {
            .search-section,
            .profile-card {
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            #displayName {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-section" id="searchSection">
            <h1>🔍 Nostr Profile Viewer</h1>
            <p class="subtitle">Search profiles using hex or npub format</p>

            <div class="input-group">
                <label for="hexInput">Hex Public Key</label>
                <input type="text" id="hexInput" placeholder="e.g., 3bf0c63fcb93463407af97a5e5ee64fa883d107ef9e558472c4eb9aaaefa3d6">
            </div>

            <div class="divider">OR</div>

            <div class="input-group">
                <label for="npubInput">Npub</label>
                <input type="text" id="npubInput" placeholder="e.g., npub1uyf5zf0sk...">
            </div>

            <button onclick="searchProfile()">Search Profile</button>

            <div class="error-message" id="errorMessage"></div>
            <div class="loading" id="loading">
                <span class="spinner"></span>
                <span>Loading profile...</span>
            </div>
        </div>

        <div class="profile-card" id="profileCard">
            <button class="back-button" onclick="backToSearch()">← Back to Search</button>

            <div class="avatar-container" id="avatarContainer">👤</div>
            <div id="displayName"></div>
            <div id="username"></div>
            <div id="pubkey"></div>
            <div id="about"></div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="followers">0</div>
                    <div class="stat-label">Followers</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="following">0</div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="posts">0</div>
                    <div class="stat-label">Posts</div>
                </div>
            </div>

            <div class="action-buttons">
                <button onclick="copyPubkey()">Copy Pubkey</button>
                <button onclick="copyNpub()">Copy Npub</button>
            </div>
        </div>
    </div>

    <script>
        const RELAYS = [
            'wss://relay.damus.io',
            'wss://nos.lol',
            'wss://nostr.wine',
            'wss://relay.nostr.band'
        ];

        let currentProfile = null;
        let activeWebSockets = [];
        let searchTimeout = null;

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        function closeAllWebSockets() {
            activeWebSockets.forEach(ws => {
                try {
                    ws.close();
                } catch (e) {}
            });
            activeWebSockets = [];
        }

        function hexToNpub(hex) {
            try {
                const charset = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
                const bytes = [];
                for (let i = 0; i < hex.length; i += 2) {
                    bytes.push(parseInt(hex.substr(i, 2), 16));
                }

                let bits = 0;
                let value = 0;
                let npub = 'npub1';

                for (let byte of bytes) {
                    value = (value << 8) | byte;
                    bits += 8;
                    while (bits >= 5) {
                        bits -= 5;
                        npub += charset[(value >> bits) & 31];
                    }
                }
                if (bits > 0) {
                    npub += charset[(value << (5 - bits)) & 31];
                }
                return npub;
            } catch (e) {
                console.error('Error converting hex to npub:', e);
                return null;
            }
        }

        function npubToHex(npub) {
            try {
                if (!npub.startsWith('npub1')) return null;
                const charset = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
                const data = npub.slice(5);
                let bits = 0;
                let value = 0;
                const bytes = [];

                for (let char of data) {
                    const index = charset.indexOf(char);
                    if (index === -1) return null;
                    value = (value << 5) | index;
                    bits += 5;
                    while (bits >= 8) {
                        bits -= 8;
                        bytes.push((value >> bits) & 255);
                    }
                }
                return bytes.map(b => b.toString(16).padStart(2, '0')).join('');
            } catch (e) {
                console.error('Error converting npub to hex:', e);
                return null;
            }
        }

        function searchProfile() {
            hideError();
            const hexInput = document.getElementById('hexInput').value.trim();
            const npubInput = document.getElementById('npubInput').value.trim();

            let pubkey = hexInput || npubInput;

            if (!pubkey) {
                showError('Please enter a hex key or npub');
                return;
            }

            if (pubkey.startsWith('npub1')) {
                pubkey = npubToHex(pubkey);
                if (!pubkey) {
                    showError('Invalid npub format');
                    return;
                }
            } else if (!/^[a-f0-9]{64}$/i.test(pubkey)) {
                showError('Invalid hex format (should be 64 hex characters)');
                return;
            }

            pubkey = pubkey.toLowerCase();
            closeAllWebSockets();
            showLoading();
            clearTimeout(searchTimeout);

            // Timeout after 8 seconds
            searchTimeout = setTimeout(() => {
                if (document.getElementById('loading').classList.contains('show')) {
                    hideLoading();
                    showError('No profile found. Try another pubkey or check your connection.');
                    closeAllWebSockets();
                }
            }, 8000);

            fetchProfileFromRelays(pubkey);
        }

        function fetchProfileFromRelays(pubkey) {
            let foundProfile = false;

            RELAYS.forEach(relayUrl => {
                try {
                    const ws = new WebSocket(relayUrl);
                    const subId = 'profile-' + Math.random().toString(36).substring(7);

                    ws.onopen = () => {
                        // Request kind 0 (metadata)
                        const filter = {
                            kinds: [0],
                            authors: [pubkey]
                        };
                        ws.send(JSON.stringify(['REQ', subId, filter]));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data);

                            if (message[0] === 'EVENT' && message[2].kind === 0 && !foundProfile) {
                                foundProfile = true;
                                clearTimeout(searchTimeout);
                                hideLoading();

                                try {
                                    const profile = JSON.parse(message[2].content);
                                    displayProfile(pubkey, profile);
                                    closeAllWebSockets();
                                } catch (parseError) {
                                    console.error('Error parsing profile content:', parseError);
                                    displayProfile(pubkey, {});
                                    closeAllWebSockets();
                                }
                            }
                        } catch (parseError) {
                            console.error('Error parsing message:', parseError);
                        }
                    };

                    ws.onerror = (error) => {
                        console.error('WebSocket error for relay', relayUrl, error);
                    };

                    ws.onclose = () => {
                        // Connection closed
                    };

                    activeWebSockets.push(ws);
                } catch (e) {
                    console.error('Error connecting to relay:', relayUrl, e);
                }
            });
        }

        function displayProfile(pubkey, profile) {
            clearTimeout(searchTimeout);
            hideLoading();

            // Clear input fields and hide search section
            document.getElementById('hexInput').value = '';
            document.getElementById('npubInput').value = '';
            document.getElementById('searchSection').classList.add('hide');

            const displayName = profile.display_name || profile.name || 'Unknown User';
            const username = profile.name || pubkey.substring(0, 8);
            const about = profile.about || 'No bio available';
            const picture = profile.picture;

            currentProfile = {
                pubkey: pubkey,
                ...profile
            };

            document.getElementById('displayName').textContent = displayName;
            document.getElementById('username').textContent = '@' + username;
            document.getElementById('pubkey').textContent = 'pubkey: ' + pubkey;
            document.getElementById('about').textContent = about;

            const avatarContainer = document.getElementById('avatarContainer');
            if (picture) {
                const img = document.createElement('img');
                img.src = picture;
                img.alt = 'avatar';
                img.onerror = function() {
                    avatarContainer.innerHTML = '👤';
                };
                avatarContainer.innerHTML = '';
                avatarContainer.appendChild(img);
            } else {
                avatarContainer.innerHTML = '👤';
            }

            document.getElementById('followers').textContent = '0';
            document.getElementById('following').textContent = '0';
            document.getElementById('posts').textContent = '0';

            document.getElementById('profileCard').classList.add('show');
        }

        function backToSearch() {
            clearTimeout(searchTimeout);
            closeAllWebSockets();
            document.getElementById('profileCard').classList.remove('show');
            document.getElementById('searchSection').classList.remove('hide');
            currentProfile = null;
            hideError();
        }

        function copyPubkey() {
            if (currentProfile) {
                navigator.clipboard.writeText(currentProfile.pubkey).then(() => {
                    alert('Pubkey copied!');
                }).catch(() => {
                    alert('Failed to copy');
                });
            }
        }

        function copyNpub() {
            if (currentProfile) {
                const npub = hexToNpub(currentProfile.pubkey);
                if (npub) {
                    navigator.clipboard.writeText(npub).then(() => {
                        alert('Npub copied!');
                    }).catch(() => {
                        alert('Failed to copy');
                    });
                }
            }
        }

        document.getElementById('hexInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchProfile();
        });

        document.getElementById('npubInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchProfile();
        });
    </script>
</body>
</html>

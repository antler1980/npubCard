<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Profile Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .search-box button {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        .profile-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: none;
        }

        .profile-container.active {
            display: block;
        }

        .profile-banner {
            width: 100%;
            height: 200px;
            background-color: #667eea;
        }

        .profile-header {
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .profile-picture {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin-top: -50px;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
            padding-top: 10px;
        }

        .profile-info h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: #333;
        }

        .profile-bio {
            margin: 0;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            background: #f9f9f9;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .profile-details {
            padding: 20px;
        }

        .detail-item {
            margin: 16px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            min-width: 100px;
        }

        .detail-value {
            color: #666;
            word-break: break-all;
        }

        .detail-value a {
            color: #0066cc;
            text-decoration: none;
            transition: color 0.2s;
        }

        .detail-value a:hover {
            color: #0052a3;
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 16px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .nip05-verified {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .lightning-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff3cd;
            color: #856404;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Nostr Profile Viewer</h1>
            <p>Search for any Nostr profile by public key or username</p>
        </div>

        <div class="error" id="error"></div>
        <div class="loading" id="loading">Fetching profile...</div>

        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter Nostr pubkey or npub..." 
                onkeypress="if(event.key === 'Enter') searchProfile()"
            >
            <button onclick="searchProfile()">Search</button>
        </div>

        <div class="profile-container" id="profileContainer"></div>
    </div>

    <script>
        async function fetchCompleteProfile(pubkey) {
            const response = await fetch(`https://nostr.band/api/v0/profiles/${pubkey}`);
            if (!response.ok) {
                throw new Error('Profile not found');
            }
            const profile = await response.json();
            
            return {
                name: profile.name,
                about: profile.about,
                picture: profile.picture,
                banner: profile.banner,
                website: profile.website,
                nip05: profile.nip05,
                followers: profile.followers,
                following: profile.following,
                notes_count: profile.notes,
                lightning: profile.lud16
            };
        }

        function displayProfile(profile) {
            const profileHTML = `
                <div>
                    ${profile.banner ? `<div class="profile-banner" style="background-image: url('${profile.banner}'); background-size: cover;"></div>` : '<div class="profile-banner"></div>'}
                    
                    <div class="profile-header">
                        ${profile.picture ? `<img src="${profile.picture}" alt="${profile.name}" class="profile-picture">` : '<div class="profile-picture" style="background: #ddd;"></div>'}
                        <div class="profile-info">
                            <h2>${profile.name || 'Unknown'}</h2>
                            <p class="profile-bio">${profile.about || 'No bio available'}</p>
                        </div>
                    </div>
                    
                    <div class="profile-stats">
                        <div class="stat">
                            <span class="stat-label">Followers</span>
                            <span class="stat-value">${profile.followers || '0'}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Following</span>
                            <span class="stat-value">${profile.following || '0'}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Posts</span>
                            <span class="stat-value">${profile.notes_count || '0'}</span>
                        </div>
                    </div>
                    
                    <div class="profile-details">
                        ${profile.website ? `
                            <div class="detail-item">
                                <span class="detail-label">🔗 Website</span>
                                <span class="detail-value"><a href="${profile.website}" target="_blank">${profile.website}</a></span>
                            </div>
                        ` : ''}
                        ${profile.nip05 ? `
                            <div class="detail-item">
                                <span class="detail-label">✓ NIP-05</span>
                                <span class="detail-value"><span class="nip05-verified">${profile.nip05}</span></span>
                            </div>
                        ` : ''}
                        ${profile.lightning ? `
                            <div class="detail-item">
                                <span class="detail-label">⚡ Lightning</span>
                                <span class="detail-value"><span class="lightning-badge">${profile.lightning}</span></span>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            const container = document.getElementById('profileContainer');
            container.innerHTML = profileHTML;
            container.classList.add('active');
        }

        async function searchProfile() {
            const input = document.getElementById('searchInput').value.trim();
            const errorEl = document.getElementById('error');
            const loadingEl = document.getElementById('loading');
            const profileContainer = document.getElementById('profileContainer');

            errorEl.classList.remove('active');
            profileContainer.classList.remove('active');

            if (!input) {
                errorEl.textContent = 'Please enter a Nostr public key or npub';
                errorEl.classList.add('active');
                return;
            }

            loadingEl.classList.add('active');

            try {
                let pubkey = input;
                
                // If it's an npub, convert to hex
                if (input.startsWith('npub1')) {
                    pubkey = input;
                }

                const profile = await fetchCompleteProfile(pubkey);
                displayProfile(profile);
                loadingEl.classList.remove('active');
            } catch (error) {
                errorEl.textContent = 'Profile not found. Make sure you entered a valid public key.';
                errorEl.classList.add('active');
                loadingEl.classList.remove('active');
            }
        }
    </script>
</body>
</html>

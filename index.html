<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Profile Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 600;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 18px;
            padding: 20px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .profile-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 30px;
            background: #f9f9f9;
        }

        .profile-header {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            align-items: flex-start;
        }

        .profile-picture {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-picture img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .profile-info p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .profile-about {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .fields-section {
            margin-top: 30px;
        }

        .fields-section h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .field-item {
            display: flex;
            gap: 15px;
            padding: 12px;
            background: white;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #e0e0e0;
        }

        .field-item.custom {
            border-left-color: #764ba2;
        }

        .field-name {
            font-weight: 600;
            color: #333;
            min-width: 150px;
            word-break: break-word;
        }

        .field-value {
            color: #555;
            flex: 1;
            word-break: break-all;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .field-value.truncated {
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }

        .field-value.truncated::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, white);
        }

        .no-profile {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Nostr Profile Viewer</h1>

        <div class="search-box">
            <input 
                type="text" 
                id="npubInput" 
                placeholder="Enter npub, nprofile, or hex pubkey..."
                autocomplete="off"
            >
            <button onclick="searchProfile()">Search</button>
        </div>

        <div id="result"></div>
    </div>

    <script type="module">
        import NDK from 'https://unpkg.com/@nostr-dev-kit/ndk@latest/dist/index.js';

        const ndk = new NDK({
            explicitRelayUrls: [
                "wss://relay.damus.io",
                "wss://nostr.band",
                "wss://nos.lol",
                "wss://relay.nostr.band",
                "wss://nostr-pub.wellorder.net",
            ],
        });

        await ndk.connect();

        window.searchProfile = async function() {
            const input = document.getElementById('npubInput').value.trim();
            const resultDiv = document.getElementById('result');

            if (!input) {
                resultDiv.innerHTML = '<div class="error">Please enter an npub, nprofile, or hex pubkey</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>Loading profile...</div>';

            try {
                const user = await ndk.getUser({ npub: input });
                await user.fetchProfile();

                const profile = user.profile;

                if (!profile) {
                    resultDiv.innerHTML = '<div class="no-profile">Profile not found</div>';
                    return;
                }

                let html = '<div class="profile-card">';

                // Header with picture, name, and about
                html += '<div class="profile-header">';

                if (profile.image) {
                    html += `<div class="profile-picture"><img src="${escapeHtml(profile.image)}" alt="Profile" onerror="this.style.display='none'"></div>`;
                } else {
                    html += '<div class="profile-picture"></div>';
                }

                html += '<div class="profile-info">';
                html += `<h2>${escapeHtml(profile.name || 'Unknown')}</h2>`;
                if (profile.nip05) html += `<p>✓ ${escapeHtml(profile.nip05)}</p>`;
                if (profile.website) html += `<p>🌐 ${escapeHtml(profile.website)}</p>`;
                if (profile.lud16 || profile.lud06) html += `<p>⚡ Lightning: ${escapeHtml(profile.lud16 || profile.lud06)}</p>`;
                html += '</div>';

                html += '</div>';

                if (profile.about) {
                    html += `<div class="profile-about">${escapeHtml(profile.about)}</div>`;
                }

                // All other fields
                html += '<div class="fields-section">';
                html += '<h3>All Fields</h3>';

                const standardFields = ['name', 'about', 'image', 'nip05', 'website', 'lud16', 'lud06'];
                const allFields = Object.keys(profile).sort();

                allFields.forEach(field => {
                    const value = profile[field];
                    const isCustom = !standardFields.includes(field);
                    const displayValue = formatValue(value);
                    const isLong = displayValue.length > 200;

                    html += `<div class="field-item ${isCustom ? 'custom' : ''}">`;
                    html += `<div class="field-name">${escapeHtml(field)}</div>`;
                    html += `<div class="field-value ${isLong ? 'truncated' : ''}">${escapeHtml(displayValue)}</div>`;
                    html += '</div>';
                });

                html += '</div>';
                html += '</div>';

                resultDiv.innerHTML = html;

            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${escapeHtml(error.message)}</div>`;
            }
        };

        function formatValue(value) {
            if (value === null || value === undefined) {
                return "(empty)";
            }

            if (typeof value === "string") {
                return value;
            }

            if (typeof value === "object") {
                return JSON.stringify(value, null, 2);
            }

            return String(value);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // Allow Enter key to search
        document.getElementById('npubInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchProfile();
        });
    </script>
</body>
</html>

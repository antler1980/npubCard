<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nostr Profile Viewer - Complete</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #b0b0b0;
      font-size: 1.1em;
    }

    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .input-section input {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1em;
      transition: all 0.3s ease;
    }

    .input-section input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      border-color: #667eea;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
    }

    .input-section button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1em;
    }

    .input-section button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .input-section button:active {
      transform: translateY(0);
    }

    .loading {
      text-align: center;
      padding: 40px;
      display: none;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      display: none;
      padding: 20px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.5);
      border-radius: 8px;
      color: #fca5a5;
      margin-bottom: 20px;
    }

    .error.active {
      display: block;
    }

    .profile-complete {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 30px;
      display: none;
    }

    .profile-complete.active {
      display: block;
    }

    .profile-complete h2 {
      font-size: 1.8em;
      margin: 30px 0 20px 0;
      color: #667eea;
      border-bottom: 2px solid rgba(102, 126, 234, 0.3);
      padding-bottom: 10px;
    }

    .profile-complete h2:first-child {
      margin-top: 0;
    }

    .profile-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .profile-table tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .profile-table tr:hover {
      background: rgba(102, 126, 234, 0.1);
    }

    .profile-table td {
      padding: 15px;
      vertical-align: top;
    }

    .profile-table td:first-child {
      width: 200px;
      font-weight: 600;
      color: #667eea;
    }

    .profile-table img {
      max-width: 200px;
      max-height: 200px;
      border-radius: 8px;
      margin: 10px 0;
    }

    .profile-table a {
      color: #667eea;
      text-decoration: none;
      word-break: break-all;
    }

    .profile-table a:hover {
      text-decoration: underline;
    }

    .profile-table pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.85em;
      color: #b0e0e6;
    }

    .relays-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .relays-table th,
    .relays-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .relays-table th {
      background: rgba(102, 126, 234, 0.2);
      font-weight: 600;
      color: #667eea;
    }

    .relays-table tr:hover {
      background: rgba(102, 126, 234, 0.1);
    }

    .relays-table a {
      color: #667eea;
      text-decoration: none;
      word-break: break-all;
    }

    .relays-table a:hover {
      text-decoration: underline;
    }

    details {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      cursor: pointer;
    }

    details summary {
      color: #667eea;
      font-weight: 600;
      user-select: none;
    }

    details summary:hover {
      text-decoration: underline;
    }

    details pre {
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      margin-top: 15px;
      font-size: 0.85em;
      color: #b0e0e6;
    }

    .profile-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .profile-card {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.3);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .profile-card h3 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .profile-card .value {
      font-size: 1.8em;
      color: #e0e0e0;
      word-break: break-all;
    }

    .profile-avatar {
      width: 150px;
      height: 150px;
      border-radius: 12px;
      object-fit: cover;
      margin: 0 auto 20px;
      border: 2px solid rgba(102, 126, 234, 0.5);
    }

    .profile-banner {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8em;
      }

      .input-section {
        flex-direction: column;
      }

      .input-section input,
      .input-section button {
        width: 100%;
      }

      .profile-table td:first-child {
        width: 120px;
      }

      .profile-complete {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 Nostr Profile Viewer</h1>
      <p>View all profile data from the Nostr network</p>
    </div>

    <div class="input-section">
      <input 
        type="text" 
        id="npubInput" 
        placeholder="Enter npub1... or hex key" 
      >
      <button onclick="handleFetch()">Fetch Profile</button>
    </div>

    <div class="error" id="error"></div>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Fetching profile data from relays...</p>
    </div>

    <div class="profile-complete" id="profile"></div>
  </div>

  <script>
    const CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';

    function bech32Decode(bech) {
      bech = bech.toLowerCase();
      const pos = bech.lastIndexOf('1');
      if (pos < 1 || pos + 7 > bech.length) return null;
      
      const data = [];
      for (let i = pos + 1; i < bech.length; i++) {
        const idx = CHARSET.indexOf(bech[i]);
        if (idx < 0) return null;
        data.push(idx);
      }
      return data;
    }

    function convertBits(data, fromBits, toBits, pad = true) {
      let acc = 0;
      let bits = 0;
      let ret = [];
      const maxv = (1 << toBits) - 1;
      const max_acc = (1 << (fromBits + toBits - 1)) - 1;
      
      for (let i = 0; i < data.length; i++) {
        const value = data[i];
        if (value < 0 || (value >> fromBits)) return null;
        acc = ((acc << fromBits) | value) & max_acc;
        bits += fromBits;
        while (bits >= toBits) {
          bits -= toBits;
          ret.push((acc >> bits) & maxv);
        }
      }
      
      if (pad) {
        if (bits) ret.push((acc << (toBits - bits)) & maxv);
      } else if (bits >= fromBits || ((acc << (toBits - bits)) & maxv)) {
        return null;
      }
      return ret;
    }

    function decodeNpub(input) {
      try {
        const data = bech32Decode(input);
        if (!data) return null;
        
        const converted = convertBits(data.slice(1), 5, 8, false);
        if (!converted || converted.length < 32) return null;
        return converted.slice(0, 32).map(b => b.toString(16).padStart(2, '0')).join('');
      } catch (e) {
        return null;
      }
    }

    function queryRelay(relay, pubkey, kind) {
      return new Promise((resolve) => {
        let ws;
        const timeout = setTimeout(() => {
          if (ws && ws.readyState === WebSocket.OPEN) ws.close();
          resolve(null);
        }, 5000);

        try {
          ws = new WebSocket(relay);
          
          ws.onopen = () => {
            ws.send(JSON.stringify([
              'REQ',
              `${kind}-${Math.random()}`,
              { kinds: [kind], authors: [pubkey], limit: 1 }
            ]));
          };

          ws.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);
              if (msg[0] === 'EVENT' && msg[2].kind === kind) {
                clearTimeout(timeout);
                if (ws && ws.readyState === WebSocket.OPEN) ws.close();
                resolve(msg[2]);
              } else if (msg[0] === 'EOSE') {
                clearTimeout(timeout);
                if (ws && ws.readyState === WebSocket.OPEN) ws.close();
                resolve(null);
              }
            } catch (e) {
              console.error('Parse error:', e);
            }
          };

          ws.onerror = () => {
            clearTimeout(timeout);
            if (ws && ws.readyState === WebSocket.OPEN) ws.close();
            resolve(null);
          };

          ws.onclose = () => {
            clearTimeout(timeout);
          };
        } catch (error) {
          clearTimeout(timeout);
          resolve(null);
        }
      });
    }

    async function fetchCompleteNostrProfile(npubOrHex) {
      let pubkey = npubOrHex.toLowerCase();
      
      if (npubOrHex.startsWith('npub1')) {
        const decoded = decodeNpub(npubOrHex);
        if (decoded) {
          pubkey = decoded;
        } else {
          throw new Error('Invalid npub format');
        }
      }

      if (!/^[a-f0-9]{64}$/.test(pubkey)) {
        throw new Error('Invalid hex key format');
      }

      const relays = [
        'wss://relay.damus.io',
        'wss://nos.lol',
        'wss://nostr.wine',
        'wss://purplepag.es'
      ];

      let profileData = {};
      let allEvents = [];

      for (const relay of relays) {
        const event0 = await queryRelay(relay, pubkey, 0);
        if (event0) allEvents.push(event0);

        const event3 = await queryRelay(relay, pubkey, 3);
        if (event3) allEvents.push(event3);

        const event10002 = await queryRelay(relay, pubkey, 10002);
        if (event10002) allEvents.push(event10002);

        if (allEvents.length > 0) break;
      }

      const metadataEvent = allEvents.find(e => e.kind === 0);
      if (metadataEvent) {
        try {
          const metadata = JSON.parse(metadataEvent.content);
          profileData = { ...profileData, ...metadata };
        } catch (e) {
          console.log('Failed to parse metadata:', e);
        }
      }

      const contactEvent = allEvents.find(e => e.kind === 3);
      if (contactEvent) {
        profileData.followers_count = contactEvent.tags.filter(t => t[0] === 'p').length;
        profileData.following = contactEvent.tags.filter(t => t[0] === 'p').map(t => t[1]);
      }

      const relayListEvent = allEvents.find(e => e.kind === 10002);
      if (relayListEvent) {
        profileData.relays = relayListEvent.tags.map(t => ({
          url: t[1],
          read: t[2]?.includes('read') ?? true,
          write: t[2]?.includes('write') ?? true
        }));
      }

      profileData.raw_events = allEvents;
      profileData.pubkey = pubkey;

      return profileData;
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    function displayAllProfileData(profileData) {
      let html = '<div class="profile-complete">';

      if (profileData.banner || profileData.header_image) {
        const bannerUrl = profileData.banner || profileData.header_image;
        html += `<img src="${escapeHtml(bannerUrl)}" class="profile-banner" alt="Profile banner" onerror="this.style.display='none'" />`;
      }

      html += '<div class="profile-info">';

      if (profileData.picture || profileData.avatar || profileData.image) {
        const pictureUrl = profileData.picture || profileData.avatar || profileData.image;
        html += `<div class="profile-card">
          <img src="${escapeHtml(pictureUrl)}" class="profile-avatar" alt="Avatar" onerror="this.style.display='none'" />
        </div>`;
      }

      if (profileData.name || profileData.display_name || profileData.username) {
        const name = profileData.name || profileData.display_name || profileData.username;
        html += `<div class="profile-card">
          <h3>Name</h3>
          <div class="value">${escapeHtml(name)}</div>
        </div>`;
      }

      if (profileData.followers_count !== undefined) {
        html += `<div class="profile-card">
          <h3>Followers</h3>
          <div class="value">${profileData.followers_count}</div>
        </div>`;
      }

      if (profileData.following && profileData.following.length > 0) {
        html += `<div class="profile-card">
          <h3>Following</h3>
          <div class="value">${profileData.following.length}</div>
        </div>`;
      }

      html += '</div>';

      const standardFields = [
        'name', 'display_name', 'username',
        'about', 'bio', 'description',
        'picture', 'avatar', 'image',
        'banner', 'header_image',
        'website', 'url', 'homepage',
        'nip05', 'lud06', 'lud16',
        'ln', 'lightning',
        'location', 'bech32',
      ];

      html += '<h2>Profile Information</h2>';
      html += '<table class="profile-table">';

      for (const field of standardFields) {
        if (profileData[field] !== undefined && profileData[field] !== null && profileData[field] !== '') {
          let value = profileData[field];
          
          if (field === 'picture' || field === 'avatar' || field === 'image' || field === 'banner' || field === 'header_image') {
            value = `<img src="${escapeHtml(value)}" style="max-width: 200px; border-radius: 8px;" onerror="this.style.display='none'" />`;
          } else if (field === 'website' || field === 'url' || field === 'homepage' || field === 'lud06' || field === 'lud16') {
            value = `<a href="${escapeHtml(value)}" target="_blank">${escapeHtml(value)}</a>`;
          } else if (Array.isArray(value)) {
            value = `<pre>${escapeHtml(JSON.stringify(value, null, 2))}</pre>`;
          } else if (typeof value === 'object') {
            value = `<pre>${escapeHtml(JSON.stringify(value, null, 2))}</pre>`;
          } else {
            value = escapeHtml(String(value));
          }
          
          html += `<tr><td>${field}</td><td>${value}</td></tr>`;
        }
      }

      const customFields = Object.entries(profileData).filter(([field, value]) => 
        !standardFields.includes(field) && 
        field !== 'raw_events' && 
        field !== 'pubkey' &&
        field !== 'followers_count' &&
        field !== 'following' &&
        field !== 'relays'
      );

      if (customFields.length > 0) {
        html += '<tr><td colspan="2"><strong style="color: #667eea;">Custom Fields</strong></td></tr>';
        for (const [field, value] of customFields) {
          let displayValue = value;
          if (Array.isArray(value)) {
            displayValue = `<pre>${escapeHtml(JSON.stringify(value, null, 2))}</pre>`;
          } else if (typeof value === 'object') {
            displayValue = `<pre>${escapeHtml(JSON.stringify(value, null, 2))}</pre>`;
          } else {
            displayValue = escapeHtml(String(value));
          }
          
          html += `<tr><td>${field}</td><td>${displayValue}</td></tr>`;
        }
      }

      html += '</table>';

      if (profileData.relays && profileData.relays.length > 0) {
        html += '<h2>Relays</h2>';
        html += '<table class="relays-table">';
        html += '<tr><th>Relay URL</th><th>Read</th><th>Write</th></tr>';
        for (const relay of profileData.relays) {
          html += `<tr>
            <td><a href="${escapeHtml(relay.url)}" target="_blank">${escapeHtml(relay.url)}</a></td>
            <td>${relay.read ? '✅ Yes' : '❌ No'}</td>
            <td>${relay.write ? '✅ Yes' : '❌ No'}</td>
          </tr>`;
        }
        html += '</table>';
      }

      if (profileData.raw_events && profileData.raw_events.length > 0) {
        html += '<h2>Raw Event Data</h2>';
        html += '<details>';
        html += '<summary>📋 View Raw Events (JSON)</summary>';
        html += `<pre>${escapeHtml(JSON.stringify(profileData.raw_events, null, 2))}</pre>`;
        html += '</details>';
      }

      html += '<h2>Identifiers</h2>';
      html += '<table class="profile-table">';
      html += `<tr><td>pubkey (hex)</td><td><code>${escapeHtml(profileData.pubkey)}</code></td></tr>`;
      html += '</table>';

      html += '</div>';
      return html;
    }

    async function handleFetch() {
      const npubInput = document.getElementById('npubInput').value.trim();
      const errorDiv = document.getElementById('error');
      const loadingDiv = document.getElementById('loading');
      const profileDiv = document.getElementById('profile');

      errorDiv.classList.remove('active');
      loadingDiv.classList.add('active');
      profileDiv.classList.remove('active');

      try {
        if (!npubInput) {
          throw new Error('Please enter an npub or hex key');
        }

        const profile = await fetchCompleteNostrProfile(npubInput);
        
        if (!profile || Object.keys(profile).length === 0) {
          throw new Error('No profile data found. Check the address and try again.');
        }

        profileDiv.innerHTML = displayAllProfileData(profile);
        profileDiv.classList.add('active');
      } catch (error) {
        errorDiv.textContent = '❌ Error: ' + error.message;
        errorDiv.classList.add('active');
        console.error('Error:', error);
      } finally {
        loadingDiv.classList.remove('active');
      }
    }

    document.getElementById('npubInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        handleFetch();
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Profile Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #searchInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        #results {
            min-height: 100px;
        }

        .profile-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #667eea;
        }

        .avatar-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #999;
            font-size: 40px;
        }

        .profile-info h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .about {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
            font-size: 15px;
        }

        .profile-info p {
            color: #555;
            margin: 12px 0;
            font-size: 14px;
            word-break: break-all;
        }

        .pubkey {
            background: white;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
        }

        .loading, .error {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            font-size: 16px;
        }

        .loading {
            color: #667eea;
            background: #f0f4ff;
        }

        .error {
            color: #d32f2f;
            background: #ffebee;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .search-box {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Nostr Profile Finder</h1>
        
        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter hex key or npub..."
            >
            <button onclick="searchProfile()">Search</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const CHARSET = "qpzry9x8gf2tvdw0s3jn54khce6mua7l";

        function bech32Decode(bech) {
            const bechLower = bech.toLowerCase();
            const pos = bechLower.lastIndexOf('1');
            
            if (pos < 1 || pos + 7 > bechLower.length) {
                return null;
            }
            
            const hrp = bechLower.substring(0, pos);
            const data = [];
            for (let i = pos + 1; i < bechLower.length; i++) {
                const idx = CHARSET.indexOf(bechLower[i]);
                if (idx < 0) {
                    return null;
                }
                data.push(idx);
            }
            
            return { hrp, data };
        }

        function convertBits(data, fromBits, toBits) {
            let acc = 0;
            let bits = 0;
            const ret = [];
            const maxv = (1 << toBits) - 1;
            
            for (let i = 0; i < data.length; i++) {
                acc = (acc << fromBits) | data[i];
                bits += fromBits;
                while (bits >= toBits) {
                    bits -= toBits;
                    ret.push((acc >> bits) & maxv);
                }
            }
            
            return ret;
        }

        function decodeNpub(npub) {
            try {
                const decoded = bech32Decode(npub);
                if (!decoded || decoded.hrp !== 'npub') {
                    return null;
                }
                
                const converted = convertBits(decoded.data, 5, 8);
                if (!converted || converted.length < 32) {
                    return null;
                }
                
                let hex = '';
                for (let i = 1; i <= 32; i++) {
                    hex += converted[i].toString(16).padStart(2, '0');
                }
                
                return hex;
            } catch (e) {
                console.error('Decode error:', e);
                return null;
            }
        }

        async function fetchProfileFromRelay(hexKey) {
            const relays = [
                'wss://nostr.wine',
                'wss://nos.lol',
                'wss://purplepag.es',
                'wss://nostr-pub.wellorder.net',
                'wss://relay.snort.social',
                'wss://offchain.pub'
            ];

            for (const relayUrl of relays) {
                try {
                    console.log('Trying relay:', relayUrl);
                    const profile = await queryRelay(relayUrl, hexKey);
                    if (profile) {
                        console.log('Profile found on:', relayUrl);
                        return profile;
                    }
                } catch (err) {
                    console.log('Relay failed:', relayUrl, err.message);
                    continue;
                }
            }

            return null;
        }

        function queryRelay(relayUrl, hexKey) {
            return new Promise((resolve, reject) => {
                try {
                    const ws = new WebSocket(relayUrl);
                    let resolved = false;
                    
                    const timeout = setTimeout(() => {
                        if (!resolved) {
                            resolved = true;
                            ws.close();
                            reject(new Error('Timeout'));
                        }
                    }, 8000);

                    ws.onopen = () => {
                        console.log('Connected to relay:', relayUrl);
                        ws.send(JSON.stringify([
                            "REQ",
                            "profile-" + hexKey.substring(0, 8),
                            { kinds: [0], authors: [hexKey], limit: 1 }
                        ]));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const msg = JSON.parse(event.data);
                            
                            if (msg[0] === 'EVENT' && msg[2].kind === 0 && !resolved) {
                                resolved = true;
                                clearTimeout(timeout);
                                ws.close();
                                resolve(JSON.parse(msg[2].content));
                            }
                        } catch (err) {
                            console.error('Parse error:', err);
                        }
                    };

                    ws.onerror = (error) => {
                        if (!resolved) {
                            resolved = true;
                            clearTimeout(timeout);
                            ws.close();
                            reject(new Error('WebSocket error'));
                        }
                    };

                    ws.onclose = () => {
                        if (!resolved) {
                            resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Connection closed'));
                        }
                    };
                } catch (err) {
                    reject(err);
                }
            });
        }

        async function searchProfile() {
            const input = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!input) {
                resultsDiv.innerHTML = '<p class="error">Please enter a hex key or npub</p>';
                return;
            }

            resultsDiv.innerHTML = '<p class="loading">Searching...</p>';
            
            let hexKey = input.toLowerCase();
            
            if (input.startsWith('npub1')) {
                hexKey = decodeNpub(input);
                if (!hexKey) {
                    resultsDiv.innerHTML = '<p class="error">Invalid npub format</p>';
                    return;
                }
            }

            if (!/^[a-f0-9]{64}$/.test(hexKey)) {
                resultsDiv.innerHTML = '<p class="error">Invalid key format</p>';
                return;
            }

            try {
                const profile = await fetchProfileFromRelay(hexKey);
                
                if (profile) {
                    resultsDiv.innerHTML = `
                        <div class="profile-card">
                            ${profile.picture ? `<img src="${profile.picture}" alt="avatar" class="avatar" onerror="this.style.display='none'">` : '<div class="avatar-placeholder">👤</div>'}
                            <div class="profile-info">
                                <h2>${profile.name || 'Unknown'}</h2>
                                <p class="about">${profile.about || 'No bio'}</p>
                                <p class="pubkey"><strong>Hex:</strong> ${hexKey}</p>
                                ${profile.nip05 ? `<p><strong>NIP-05:</strong> ${profile.nip05}</p>` : ''}
                                ${profile.website ? `<p><strong>Website:</strong> <a href="${profile.website}" target="_blank">${profile.website}</a></p>` : ''}
                            </div>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = '<p class="error">Profile not found on any relay</p>';
                }
            } catch (err) {
                resultsDiv.innerHTML = '<p class="error">Error fetching profile</p>';
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchProfile();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Profile Viewer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        .search-box button {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            color: #667eea;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        .profile-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: none;
        }

        .profile-container.active {
            display: block;
        }

        .profile-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
            background-position: center;
        }

        .profile-header {
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .profile-picture {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin-top: -50px;
            flex-shrink: 0;
            background: #ddd;
        }

        .profile-info {
            flex: 1;
            padding-top: 10px;
        }

        .profile-info h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: #333;
        }

        .profile-bio {
            margin: 0;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            background: #f9f9f9;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .profile-details {
            padding: 20px;
        }

        .detail-item {
            margin: 16px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            min-width: 100px;
        }

        .detail-value {
            color: #666;
            word-break: break-all;
            flex: 1;
        }

        .detail-value a {
            color: #0066cc;
            text-decoration: none;
            transition: color 0.2s;
        }

        .detail-value a:hover {
            color: #0052a3;
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 16px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .nip05-verified {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .lightning-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff3cd;
            color: #856404;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .pubkey-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }

        .pubkey-text {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Nostr Profile Viewer</h1>
            <p>Search for any Nostr profile by public key or npub</p>
        </div>

        <div class="error" id="error"></div>
        <div class="loading" id="loading"><span class="spinner"></span>Fetching profile...</div>

        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter Nostr pubkey or npub..." 
                onkeypress="if(event.key === 'Enter') searchProfile()"
            >
            <button onclick="searchProfile()">Search</button>
        </div>

        <div class="profile-container" id="profileContainer"></div>
    </div>

    <script>
        const RELAYS = [
            'wss://relay.damus.io',
            'wss://nos.lol',
            'wss://nostr.wine'
        ];

        const CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';

        function npubToHex(npub) {
            try {
                if (!npub.startsWith('npub1')) {
                    return null;
                }

                const data = npub.slice(5, -6);
                let bits = 0;
                let value = 0;
                const bytes = [];

                for (let i = 0; i < data.length; i++) {
                    const char = data[i];
                    const index = CHARSET.indexOf(char);
                    if (index === -1) {
                        return null;
                    }
                    value = (value << 5) | index;
                    bits += 5;

                    while (bits >= 8) {
                        bits -= 8;
                        bytes.push((value >> bits) & 255);
                    }
                }

                const hex = bytes.slice(0, 32).map(b => b.toString(16).padStart(2, '0')).join('');
                
                if (hex.length !== 64) {
                    return null;
                }

                return hex;
            } catch (e) {
                return null;
            }
        }

        function hexToNpub(hex) {
            try {
                const bytes = [];
                for (let i = 0; i < hex.length; i += 2) {
                    bytes.push(parseInt(hex.substr(i, 2), 16));
                }

                let bits = 0;
                let value = 0;
                let npub = 'npub1';

                for (let byte of bytes) {
                    value = (value << 8) | byte;
                    bits += 8;

                    while (bits >= 5) {
                        bits -= 5;
                        npub += CHARSET[(value >> bits) & 31];
                    }
                }

                if (bits > 0) {
                    npub += CHARSET[(value << (5 - bits)) & 31];
                }

                npub += '000000';
                return npub;
            } catch (e) {
                return null;
            }
        }

        function fetchFromRelay(relayUrl, pubkey) {
            return new Promise((resolve) => {
                let ws = null;
                let timeout = null;
                let resolved = false;

                try {
                    ws = new WebSocket(relayUrl);

                    timeout = setTimeout(() => {
                        if (!resolved) {
                            resolved = true;
                            if (ws && ws.readyState === WebSocket.OPEN) {
                                ws.close();
                            }
                            resolve(null);
                        }
                    }, 4000);

                    ws.onopen = () => {
                        const subId = 'p' + Math.random().toString(36).substring(7);
                        const filter = { kinds: [0], authors: [pubkey] };
                        ws.send(JSON.stringify(['REQ', subId, filter]));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data);

                            if (message[0] === 'EVENT' && !resolved) {
                                const evt = message[2];
                                if (evt.kind === 0) {
                                    resolved = true;
                                    clearTimeout(timeout);
                                    if (ws) ws.close();

                                    try {
                                        const profile = JSON.parse(evt.content);
                                        resolve(profile);
                                    } catch (parseErr) {
                                        resolve({});
                                    }
                                }
                            }
                        } catch (e) {}
                    };

                    ws.onerror = () => {
                        if (!resolved) {
                            resolved = true;
                            clearTimeout(timeout);
                            resolve(null);
                        }
                    };

                    ws.onclose = () => {
                        if (!resolved) {
                            resolved = true;
                            clearTimeout(timeout);
                            resolve(null);
                        }
                    };
                } catch (e) {
                    clearTimeout(timeout);
                    resolve(null);
                }
            });
        }

        async function fetchCompleteProfile(pubkey) {
            for (const relay of RELAYS) {
                const profile = await fetchFromRelay(relay, pubkey);
                if (profile && Object.keys(profile).length > 0) {
                    return {
                        pubkey: pubkey,
                        name: profile.display_name || profile.name || 'Anonymous',
                        about: profile.about || '',
                        picture: profile.picture || '',
                        banner: profile.banner || '',
                        website: profile.website || '',
                        nip05: profile.nip05 || '',
                        lightning: profile.lud16 || ''
                    };
                }
            }
            throw new Error('Profile not found on any relay');
        }

        async function fetchStats(pubkey) {
            for (const relay of RELAYS) {
                const ws = new WebSocket(relay);
                
                return new Promise((resolve) => {
                    let following = 0;
                    let posts = 0;

                    const timeout = setTimeout(() => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.close();
                        }
                        resolve({ following, posts });
                    }, 3000);

                    ws.onopen = () => {
                        const filter = { authors: [pubkey], kinds: [1, 3] };
                        ws.send(JSON.stringify(['REQ', 'stats-' + pubkey, filter]));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data);

                            if (message[0] === 'EVENT') {
                                const evt = message[2];
                                if (evt.kind === 3) {
                                    const tags = evt.tags || [];
                                    following = tags.filter(tag => tag[0] === 'p').length;
                                } else if (evt.kind === 1) {
                                    posts++;
                                }
                            }

                            if (message[0] === 'EOSE') {
                                clearTimeout(timeout);
                                ws.close();
                                resolve({ following, posts });
                            }
                        } catch (e) {}
                    };

                    ws.onerror = () => {
                        clearTimeout(timeout);
                        resolve({ following, posts });
                    };
                });
            }
        }

        function displayProfile(profile, stats) {
            const npub = hexToNpub(profile.pubkey);
            
            const profileHTML = `
                <div>
                    ${profile.banner ? `<div class="profile-banner" style="background-image: url('${profile.banner}');"></div>` : '<div class="profile-banner"></div>'}
                    
                    <div class="profile-header">
                        ${profile.picture ? `<img src="${profile.picture}" alt="${profile.name}" class="profile-picture" onerror="this.style.display='none'">` : ''}
                        <div class="profile-info">
                            <h2>${profile.name}</h2>
                            <p class="profile-bio">${profile.about || 'No bio available'}</p>
                        </div>
                    </div>
                    
                    <div class="profile-stats">
                        <div class="stat">
                            <span class="stat-label">Following</span>
                            <span class="stat-value">${stats.following || '0'}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Posts</span>
                            <span class="stat-value">${stats.posts || '0'}</span>
                        </div>
                    </div>
                    
                    <div class="profile-details">
                        ${profile.website ? `
                            <div class="detail-item">
                                <span class="detail-label">🔗 Website</span>
                                <span class="detail-value"><a href="${profile.website}" target="_blank">${profile.website}</a></span>
                            </div>
                        ` : ''}
                        ${profile.nip05 ? `
                            <div class="detail-item">
                                <span class="detail-label">✓ NIP-05</span>
                                <span class="detail-value"><span class="nip05-verified">${profile.nip05}</span></span>
                            </div>
                        ` : ''}
                        ${profile.lightning ? `
                            <div class="detail-item">
                                <span class="detail-label">⚡ Lightning</span>
                                <span class="detail-value"><span class="lightning-badge">${profile.lightning}</span></span>
                            </div>
                        ` : ''}
                        
                        <div class="pubkey-section">
                            <div><strong>Public Key (hex):</strong></div>
                            <div class="pubkey-text">${profile.pubkey}</div>
                            <div style="margin-top: 12px;"><strong>Public Key (npub):</strong></div>
                            <div class="pubkey-text">${npub}</div>
                        </div>
                    </div>
                </div>
            `;
            
            const container = document.getElementById('profileContainer');
            container.innerHTML = profileHTML;
            container.classList.add('active');
        }

        async function searchProfile() {
            const input = document.getElementById('searchInput').value.trim();
            const errorEl = document.getElementById('error');
            const loadingEl = document.getElementById('loading');
            const profileContainer = document.getElementById('profileContainer');

            errorEl.classList.remove('active');
            profileContainer.classList.remove('active');

            if (!input) {
                errorEl.textContent = 'Please enter a Nostr public key or npub';
                errorEl.classList.add('active');
                return;
            }

            loadingEl.classList.add('active');

            try {
                let pubkey = input;
                
                // If it's an npub, convert to hex
                if (input.startsWith('npub1')) {
                    pubkey = npubToHex(input);
                    if (!pubkey) {
                        throw new Error('Invalid npub format');
                    }
                } else if (!/^[a-f0-9]{64}$/i.test(input)) {
                    throw new Error('Invalid format. Please enter a valid hex key or npub');
                }

                pubkey = pubkey.toLowerCase();

                const profile = await fetchCompleteProfile(pubkey);
                const stats = await fetchStats(pubkey);
                
                displayProfile(profile, stats);
                loadingEl.classList.remove('active');
            } catch (error) {
                errorEl.textContent = error.message || 'Profile not found. Make sure you entered a valid public key.';
                errorEl.classList.add('active');
                loadingEl.classList.remove('active');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Profile Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .search-section {
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            color: #999;
            margin: 20px 0;
            font-size: 14px;
        }

        .profile-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .profile-card.show {
            display: block;
        }

        .profile-header {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e0e0e0;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h2 {
            color: #333;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .profile-info p {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .profile-about {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .copy-button {
            padding: 6px 12px;
            font-size: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
        }

        .copy-button:hover {
            background: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .profile-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Nostr Profile Search</h1>

        <div class="search-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="hexInput" 
                    placeholder="Enter hex key (64 characters)..."
                >
                <button onclick="searchProfile()">Search</button>
            </div>

            <div class="divider">OR</div>

            <div class="input-group">
                <input 
                    type="text" 
                    id="npubInput" 
                    placeholder="Enter npub1..."
                >
                <button onclick="searchProfile()">Search</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <span class="spinner"></span>Loading profile...
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="profile-card" id="profileCard">
            <div class="profile-header">
                <div class="profile-avatar" id="avatarContainer">
                    👤
                </div>
                <div class="profile-info">
                    <h2 id="displayName">Name</h2>
                    <p id="username">@username</p>
                    <p id="pubkey" style="font-size: 11px; font-family: monospace; word-break: break-all;"></p>
                    <button class="copy-button" onclick="copyToClipboard()">Copy pubkey</button>
                </div>
            </div>

            <div class="profile-about" id="about"></div>

            <div class="profile-stats">
                <div class="stat">
                    <div class="stat-value" id="followers">0</div>
                    <div class="stat-label">Followers</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="following">0</div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="posts">0</div>
                    <div class="stat-label">Posts</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const RELAY_URLS = [
            'wss://relay.damus.io',
            'wss://nos.lol',
            'wss://nostr.wine'
        ];

        const CHARSET = "qpzry9x8gf2tvdw0s3jn54khce6mua7l";
        let currentProfile = null;
        let webSockets = [];

        // Bech32 decode function
        function bech32Decode(bech) {
            const bechLower = bech.toLowerCase();
            const pos = bechLower.lastIndexOf('1');
            
            if (pos < 1 || pos + 7 > bechLower.length) {
                return null;
            }
            
            const hrp = bechLower.substring(0, pos);
            const data = [];
            for (let i = pos + 1; i < bechLower.length; i++) {
                const idx = CHARSET.indexOf(bechLower[i]);
                if (idx < 0) {
                    return null;
                }
                data.push(idx);
            }
            
            return { hrp, data };
        }

        // Convert bits function
        function convertBits(data, fromBits, toBits) {
            let acc = 0;
            let bits = 0;
            const ret = [];
            const maxv = (1 << toBits) - 1;
            
            for (let i = 0; i < data.length; i++) {
                acc = (acc << fromBits) | data[i];
                bits += fromBits;
                while (bits >= toBits) {
                    bits -= toBits;
                    ret.push((acc >> bits) & maxv);
                }
            }
            
            return ret;
        }

        // Convert npub to hex
        function npubToHex(npub) {
            try {
                const decoded = bech32Decode(npub);
                if (!decoded || decoded.hrp !== 'npub') {
                    return null;
                }
                
                const converted = convertBits(decoded.data, 5, 8);
                if (!converted || converted.length < 32) {
                    return null;
                }
                
                let hex = '';
                for (let i = 0; i < 32; i++) {
                    hex += converted[i].toString(16).padStart(2, '0');
                }
                
                return hex;
            } catch (e) {
                console.error('Decode error:', e);
                return null;
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            const errorEl = document.getElementById('errorMessage');
            errorEl.classList.remove('show');
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function closeWebSockets() {
            webSockets.forEach(ws => {
                try {
                    if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
                        ws.close();
                    }
                } catch (e) {}
            });
            webSockets = [];
        }

        function isValidHex(hex) {
            return /^[0-9a-fA-F]{64}$/.test(hex);
        }

        function searchProfile() {
            hideError();
            const hexInput = document.getElementById('hexInput').value.trim();
            const npubInput = document.getElementById('npubInput').value.trim();

            let pubkey = null;

            if (hexInput) {
                if (!isValidHex(hexInput)) {
                    showError('Invalid hex key format (must be 64 characters)');
                    return;
                }
                pubkey = hexInput.toLowerCase();
            } else if (npubInput) {
                if (!npubInput.startsWith('npub1')) {
                    showError('Invalid npub format (must start with npub1)');
                    return;
                }
                pubkey = npubToHex(npubInput);
                if (!pubkey) {
                    showError('Invalid npub format. Please check and try again.');
                    return;
                }
            } else {
                showError('Please enter a hex key or npub address');
                return;
            }

            closeWebSockets();
            showLoading();
            document.getElementById('profileCard').classList.remove('show');

            fetchProfile(pubkey);
        }

        function fetchProfile(pubkey) {
            let profileFound = false;
            let relayConnected = 0;

            RELAY_URLS.forEach(relayUrl => {
                try {
                    const ws = new WebSocket(relayUrl);
                    let timeout;

                    ws.onopen = () => {
                        relayConnected++;
                        const sub = ['REQ', 'profile-' + Math.random(), { authors: [pubkey], kinds: [0, 3] }];
                        ws.send(JSON.stringify(sub));

                        timeout = setTimeout(() => {
                            try {
                                ws.close();
                            } catch (e) {}
                        }, 3000);
                    };

                    ws.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data);

                            if (message[0] === 'EVENT') {
                                const eventData = message[2];
                                if (eventData.kind === 0 && !profileFound) {
                                    profileFound = true;
                                    clearTimeout(timeout);
                                    try {
                                        const profile = JSON.parse(eventData.content);
                                        displayProfile(pubkey, profile, eventData.tags);
                                    } catch (e) {
                                        displayProfile(pubkey, {}, eventData.tags);
                                    }
                                    closeWebSockets();
                                }
                            }
                        } catch (e) {
                            console.error('Error parsing message:', e);
                        }
                    };

                    ws.onerror = () => {
                        console.error('WebSocket error for relay:', relayUrl);
                    };

                    ws.onclose = () => {
                        clearTimeout(timeout);
                    };

                    webSockets.push(ws);
                } catch (e) {
                    console.error('Error connecting to relay:', relayUrl, e);
                }
            });

            setTimeout(() => {
                hideLoading();
                if (!profileFound && relayConnected === 0) {
                    showError('Could not connect to any relay. Try again later.');
                } else if (!profileFound) {
                    showError('Profile not found. Try another pubkey.');
                }
            }, 4000);
        }

        function displayProfile(pubkey, profile, tags) {
            hideLoading();

            const displayName = profile.display_name || profile.name || 'Unknown User';
            const username = profile.name || pubkey.substring(0, 8);
            const about = profile.about || 'No bio available';
            const picture = profile.picture;

            currentProfile = {
                pubkey: pubkey,
                ...profile
            };

            document.getElementById('displayName').textContent = displayName;
            document.getElementById('username').textContent = '@' + username;
            document.getElementById('pubkey').textContent = 'pubkey: ' + pubkey;
            document.getElementById('about').textContent = about;

            const avatarContainer = document.getElementById('avatarContainer');
            if (picture) {
                avatarContainer.innerHTML = `<img src="${picture}" alt="avatar" onerror="this.parentElement.innerHTML='👤'">`;
            } else {
                avatarContainer.innerHTML = '👤';
            }

            const followers = tags ? tags.filter(t => t[0] === 'p').length : 0;
            document.getElementById('followers').textContent = followers;
            document.getElementById('following').textContent = '0';
            document.getElementById('posts').textContent = '0';

            document.getElementById('profileCard').classList.add('show');
        }

        function copyToClipboard() {
            if (!currentProfile) return;
            const pubkey = currentProfile.pubkey;
            navigator.clipboard.writeText(pubkey).then(() => {
                alert('Pubkey copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy pubkey');
            });
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            const hexInput = document.getElementById('hexInput');
            if (hexInput) {
                hexInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') searchProfile();
                });
            }

            const npubInput = document.getElementById('npubInput');
            if (npubInput) {
                npubInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') searchProfile();
                });
            }
        });
    </script>
</body>
</html>

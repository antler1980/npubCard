<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Profile Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .search-section {
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            color: #999;
            margin: 20px 0;
            font-size: 14px;
        }

        .profile-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .profile-card.show {
            display: block;
        }

        .profile-header {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e0e0e0;
            flex-shrink: 0;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h2 {
            color: #333;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .profile-info p {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .profile-about {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .copy-button {
            padding: 6px 12px;
            font-size: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
        }

        .copy-button:hover {
            background: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .profile-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Nostr Profile Search</h1>

        <div class="search-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="hexInput" 
                    placeholder="Enter hex key (64 characters)..."
                >
                <button onclick="searchProfile()">Search</button>
            </div>

            <div class="divider">OR</div>

            <div class="input-group">
                <input 
                    type="text" 
                    id="npubInput" 
                    placeholder="Enter npub1..."
                >
                <button onclick="searchProfile()">Search</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <span class="spinner"></span>Loading profile...
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="profile-card" id="profileCard">
            <div class="profile-header">
                <div class="profile-avatar">
                    <img id="avatar" src="" alt="Profile avatar">
                </div>
                <div class="profile-info">
                    <h2 id="displayName">Name</h2>
                    <p id="username">@username</p>
                    <p id="pubkey" style="font-size: 11px; font-family: monospace; word-break: break-all;"></p>
                    <button class="copy-button" onclick="copyToClipboard()">Copy pubkey</button>
                </div>
            </div>

            <div class="profile-about" id="about"></div>

            <div class="profile-stats">
                <div class="stat">
                    <div class="stat-value" id="followers">0</div>
                    <div class="stat-label">Followers</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="following">0</div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="posts">0</div>
                    <div class="stat-label">Posts</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const RELAY_URLS = [
            'wss://relay.damus.io',
            'wss://nos.lol',
            'wss://relay.nostr.band',
            'wss://relay.snort.social'
        ];

        let currentProfile = null;
        let webSockets = [];

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            const errorEl = document.getElementById('errorMessage');
            errorEl.classList.remove('show');
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function closeWebSockets() {
            webSockets.forEach(ws => {
                try {
                    ws.close();
                } catch (e) {}
            });
            webSockets = [];
        }

        function convertNpubToHex(npub) {
            try {
                const decoded = bech32.decode(npub);
                if (decoded.prefix !== 'npub') {
                    throw new Error('Invalid npub format');
                }
                const hex = Buffer.from(bech32.fromWords(decoded.words)).toString('hex');
                return hex;
            } catch (e) {
                return null;
            }
        }

        function isValidHex(hex) {
            return /^[0-9a-fA-F]{64}$/.test(hex);
        }

        function searchProfile() {
            hideError();
            const hexInput = document.getElementById('hexInput').value.trim();
            const npubInput = document.getElementById('npubInput').value.trim();

            let pubkey = hexInput || npubInput;

            if (!pubkey) {
                showError('Please enter a hex key or npub address');
                return;
            }

            if (npubInput && npubInput.startsWith('npub1')) {
                pubkey = convertNpubToHex(npubInput);
                if (!pubkey) {
                    showError('Invalid npub format');
                    return;
                }
            }

            if (!isValidHex(pubkey)) {
                showError('Invalid hex key format (must be 64 characters)');
                return;
            }

            closeWebSockets();
            showLoading();
            document.getElementById('profileCard').classList.remove('show');

            fetchProfile(pubkey);
        }

        function fetchProfile(pubkey) {
            let profileFound = false;
            let contactsFound = false;
            const profileData = {};

            RELAY_URLS.forEach(relayUrl => {
                try {
                    const ws = new WebSocket(relayUrl);

                    ws.onopen = () => {
                        const sub = ['REQ', 'profile-' + pubkey, { authors: [pubkey], kinds: [0, 3] }];
                        ws.send(JSON.stringify(sub));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data);

                            if (message[0] === 'EVENT') {
                                const event = message[2];
                                if (event.kind === 0 && !profileFound) {
                                    profileFound = true;
                                    try {
                                        profileData.profile = JSON.parse(event.content);
                                    } catch (e) {
                                        profileData.profile = {};
                                    }
                                }
                                if (event.kind === 3 && !contactsFound) {
                                    contactsFound = true;
                                    profileData.contacts = event.tags;
                                }
                            }

                            if ((profileFound || contactsFound) && message[0] === 'EOSE') {
                                if (profileData.profile || profileData.contacts) {
                                    displayProfile(pubkey, profileData);
                                    closeWebSockets();
                                }
                            }
                        } catch (e) {
                            console.error('Error parsing message:', e);
                        }
                    };

                    ws.onerror = () => {
                        console.error('WebSocket error for relay:', relayUrl);
                    };

                    webSockets.push(ws);
                } catch (e) {
                    console.error('Error connecting to relay:', relayUrl, e);
                }
            });

            setTimeout(() => {
                hideLoading();
                if (!profileFound && !contactsFound) {
                    showError('Profile not found. Try another pubkey.');
                }
            }, 5000);
        }

        function displayProfile(pubkey, data) {
            hideLoading();
            const profile = data.profile || {};
            const contacts = data.contacts || [];

            currentProfile = {
                pubkey: pubkey,
                ...profile
            };

            const displayName = profile.display_name || profile.name || 'Unknown User';
            const username = profile.name || 'no-username';
            const about = profile.about || 'No bio available';
            const picture = profile.picture || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ccc%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E';

            document.getElementById('displayName').textContent = displayName;
            document.getElementById('username').textContent = '@' + username;
            document.getElementById('pubkey').textContent = 'pubkey: ' + pubkey;
            document.getElementById('about').textContent = about;
            document.getElementById('avatar').src = picture;
            document.getElementById('avatar').onerror = function() {
                this.style.display = 'none';
            };

            const followers = contacts.length;
            document.getElementById('followers').textContent = followers;
            document.getElementById('following').textContent = '0';
            document.getElementById('posts').textContent = '0';

            document.getElementById('profileCard').classList.add('show');
        }

        function copyToClipboard() {
            if (!currentProfile) return;
            const pubkey = currentProfile.pubkey;
            navigator.clipboard.writeText(pubkey).then(() => {
                alert('Pubkey copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy pubkey');
            });
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            const hexInput = document.getElementById('hexInput');
            if (hexInput) {
                hexInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') searchProfile();
                });
            }

            const npubInput = document.getElementById('npubInput');
            if (npubInput) {
                npubInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') searchProfile();
                });
            }
        });
    </script>
</body>
</html>
